<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gegevens Invullen</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/overwrite.css" />
  </head>
  <body>
    <nav class="navbar bg-body-tertiary">
      <div class="container">
        <div class="col-3 pt-2" style="width: 45%">
          <a class="navbar-brand" href="/html/">
            <img src="/img/fanvestLogo.jpg" alt="Bootstrap" width="50%" />
          </a>
        </div>
        <div class="col-9">
          <div class="row-6"></div>
          <div class="row-6">
            <p></p>
          </div>
        </div>
      </div>
    </nav>

    <main class="container text-center">
      <div class="row">
        <div class="row mt-3">
          <h4>Vul de vragenlijst aub zo eerlijk mogelijk in</h4>
        </div>
        <hr />
      </div>

      <!-- First Name -->
<div class="mb-3">
  <label for="firstName" class="form-label">Voornaam</label>
  <input type="text" class="form-control" id="firstName" name="firstName" required>
</div>

<!-- Last Name -->
<div class="mb-3">
  <label for="lastName" class="form-label">Achternaam</label>
  <input type="text" class="form-control" id="lastName" name="lastName" required>
</div>

<!-- Email -->
<div class="mb-3">
  <label for="email" class="form-label">E-mail</label>
  <input type="email" class="form-control" id="email" name="email" required>
</div>

<!-- Birth Year (Date Input) -->
<div class="mb-3">
  <label for="birthYear" class="form-label">Geboortejaar</label>
  <input type="date" class="form-control" id="birthYear" name="birthYear" required>
</div>

<!-- Gender Dropdown -->
<div class="mb-3">
  <label for="gender" class="form-label">Geslacht</label>
  <select class="form-select" id="gender" name="gender" required>
    <option value="" disabled selected>Kies...</option>
    <option value="Man">Man</option>
    <option value="Vrouw">Vrouw</option>
    <option value="Andere">Andere</option>
  </select>
</div>

<!-- Occupation Dropdown -->
<div class="mb-3">
  <label for="occupation" class="form-label">Beroep</label>
  <select class="form-select" id="occupation" name="occupation" required>
    <option value="" disabled selected>Kies...</option>
    <option value="Student">Student</option>
    <option value="Werknemer">Werknemer</option>
    <option value="Zelfstandige">Zelfstandige</option>
    <option value="Werkzoekende">Werkzoekende</option>
    <option value="Niet-actief">Niet-actief</option>
  </select>
</div>

<!-- Location (City Autocomplete) -->
<div class="mb-3">
  <label for="location" class="form-label">Woonplaats</label>
  <input type="text" class="form-control" id="location" name="location" autocomplete="off" required>
  <div id="cityList" class="list-group position-absolute w-100"></div>
</div>

<!-- Function / Role (Modal Selection) -->
<!-- Function Modal -->
<!-- Function Modal -->
<div class="modal fade" id="functionModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5 class="modal-title mb-3">Selecteer jouw rol</h5>

      <!-- Selection Buttons -->
      <button class="btn btn-outline-primary w-100 mb-2" id="selectFan">Fan</button>
      <button class="btn btn-outline-primary w-100" id="selectArtist">Artiest</button>

      <hr>

      <!-- Continue Button -->
      <button class="btn btn-primary w-100 mt-2" id="continueBtn">
        Ga verder
      </button>

    </div>
  </div>
</div>

<!-- The visible button -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#functionModal">
  Kies functie
</button>

<!-- Hidden input to store the selected value -->
<input type="hidden" id="functionRole" name="function">


    <script src="/js/form.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
